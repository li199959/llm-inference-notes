<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>高效 LLM 推理阅读器</title>
    <link rel="stylesheet" href="./reader.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div>
            <p class="eyebrow">Efficient LLM Inference</p>
            <h1>高效 LLM 推理</h1>
          </div>
          <button class="icon-button mobile-only" id="closeNav" aria-label="关闭目录">×</button>
        </div>

        <label class="search-box" for="searchInput">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="搜索章节内容" autocomplete="off" />
        </label>

        <nav class="chapter-list" id="chapterList" aria-label="章节目录"></nav>
      </aside>

      <main class="reader">
        <header class="topbar">
          <button class="icon-button mobile-only" id="openNav" aria-label="打开目录">☰</button>
          <div class="current-meta">
            <span id="currentKind">Chapter</span>
            <strong id="currentTitle">正在载入</strong>
          </div>
          <div class="top-actions">
            <button class="icon-button" id="fontDown" aria-label="减小字号">A−</button>
            <button class="icon-button" id="fontUp" aria-label="增大字号">A+</button>
            <button class="icon-button" id="themeToggle" aria-label="切换主题">◐</button>
          </div>
        </header>

        <div class="progress-track" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <section class="study-layout">
          <article class="content" id="content" aria-live="polite"></article>
          <aside class="outline-panel" aria-label="本章大纲">
            <div class="outline-title">本章大纲</div>
            <nav id="outline"></nav>
          </aside>
        </section>

        <footer class="reader-footer">
          <button class="nav-button" id="prevChapter">← 上一章</button>
          <button class="nav-button" id="nextChapter">下一章 →</button>
        </footer>
      </main>
    </div>

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
          displayMath: [
            ["$$", "$$"],
            ["\\[", "\\]"],
          ],
          processEscapes: true,
        },
        svg: {
          fontCache: "global",
        },
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script src="./reader.js"></script>
  </body>
</html>
